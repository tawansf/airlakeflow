# Data contract - Bronze Bitcoin (demo com dados mock)
dataset: postgres_datawarehouse/datawarehouse/bronze/bitcoin_raw

checks:
  - row_count:
      name: Table exists and is readable
      threshold:
        must_be_greater_than_or_equal: 0

columns:
  - name: data_ingestao
    checks:
      - missing:
          name: Data ingestao never null
          threshold:
            must_be: 0
  - name: payload
    checks:
      - missing:
          name: Payload is never null
          threshold:
            must_be: 0
