# Data contract - Bronze User (demo)
dataset: postgres_datawarehouse/datawarehouse/bronze/user

checks:
  - row_count:
      name: Table exists and is readable
      threshold:
        must_be_greater_than_or_equal: 0

columns:
  - name: name
    checks:
      - missing:
          name: Name never null
          threshold:
            must_be: 0
  - name: created_at
    checks:
      - missing:
          name: Created_at never null
          threshold:
            must_be: 0
