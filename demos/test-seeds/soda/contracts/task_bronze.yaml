# Data contract - Bronze Task (demo)
dataset: postgres_datawarehouse/datawarehouse/bronze/task

checks:
  - row_count:
      name: Table exists and is readable
      threshold:
        must_be_greater_than_or_equal: 0

columns:
  - name: user_id
    checks:
      - missing:
          name: User_id never null
          threshold:
            must_be: 0
  - name: title
    checks:
      - missing:
          name: Title never null
          threshold:
            must_be: 0
