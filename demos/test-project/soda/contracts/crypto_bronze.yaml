# Data Contract - Bronze Crypto
dataset: postgres_datawarehouse/datawarehouse/bronze/crypto_raw

checks:
  - row_count:
      name: Table exists and is readable
      threshold:
        must_be_greater_than_or_equal: 0

columns:
  - name: id
    checks:
      - duplicate:
          name: No duplicate IDs
  - name: ingested_at
    checks:
      - missing:
          name: Ingested at never null
          threshold:
            must_be: 0
  - name: payload
    checks:
      - missing:
          name: Payload never null
          threshold:
            must_be: 0