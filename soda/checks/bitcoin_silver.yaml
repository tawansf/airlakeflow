# Quality contracts for silver.bitcoin (refined Bitcoin price data).
checks for silver.bitcoin:
  - row_count > 0:
      name: Table is not empty

  - min(price) > 0:
      name: Price is positive and greater than zero

  - freshness(updated_at) < 72h:
      name: Recent data

  # Ensures no rows with currency other than USD (filtered set should be empty).
  - row_count = 0:
      name: No non-USD rows allowed
      filter: currency != 'usd'